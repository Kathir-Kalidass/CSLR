<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSLR Component Demo UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/TextPlugin.min.js"></script>
  <script type="module" defer src="/static/app.js"></script>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="min-h-screen text-slate-100" data-page="__PAGE_MODE__">
  <canvas id="particleCanvas" class="particle-canvas"></canvas>
  <div class="bg-layer"></div>
  <main id="appRoot" class="relative z-10 mx-auto max-w-7xl px-4 py-6 md:px-8"></main>

  <div id="popupBackdrop" class="popup-backdrop hidden"></div>
  <section id="popupPanel" class="popup-panel hidden" aria-live="polite"></section>
</body>
</html>
